<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico de Ticket Causality - Janeiro de 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-indigo-900">Métricas Analíticas Aprofundadas</h1>
            <p class="text-gray-500 mt-2">Origem, criadores e tempos de resolução detalhados em Janeiro de 2026.</p>
        </header>

        <div class="grid grid-cols-1 mb-10">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                   <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Total de Chamados Analisados</h2>
                   <p class="text-5xl font-extrabold text-indigo-600 mt-2">262</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Gráfico: Criadores (Pessoa vs Bot) -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Origem de Abertura</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="creatorChart"></canvas>
                </div>
            </div>

            <!-- Gráfico: Tempo de Resolução -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Média Horas Resolução (Por Tipo)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="resolutionTimeChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Gráfico: Evolução Diária Resposta -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Diário: Média 1ª Resposta (Horas)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="dailyFrTimeChart"></canvas>
                </div>
            </div>
            <!-- Gráfico: Evolução Diária Resolução -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Diário: Média Resolução (Horas)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="dailyResTimeChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados Injetados Pelo Node.js
        const creatorLabels = ["claudio henrique dumas dias","Infraestrutura","Alisson Miguel Bertocci","NOC Grupo Cednet","Marcos Ribeiro","T.I - Grupo CEDNET","Luiz Gustavo Bachiega","Mayara Fernandes Figueiredo","Vinicius de Moraes","Julberto Capra Jr","Fernando Felipe Constantino Callegari","julia marcelino","Andrew Oliveira","Maria Eduarda","Maria Luíza Oliveira e Silva","Eduardo Oliveira","Marcos Vinicius Cardoso","Gustavo Gigliotte Teixeira","Leonardo Henrique ","Daniel","Emanuel","luiz henrique da silva","marco antonio pereira rodrigues","Gabriel Almeida Mattos","Elivelton Marques do Santos","vicente dutra de sousa","João Gabriel Povoa de Goes","Vinicius de Oliveira da Silva","Chrystyan Albuquerque","Marcio David Pereira do Carmo","Matheus Esposto Sagae","Luan Borges","Julio Cesar","Guilherme Bacchiega de Jesus","Alexsander de Oliveira Brazão"];
        const creatorData = [2,54,5,58,1,4,5,2,4,15,8,7,7,5,5,4,3,8,6,3,12,3,4,8,3,3,5,4,1,2,3,3,1,2,2];
        
        const typeLabels = ["Tarefa","[System] Incident","[System] Problem"];
        const typeData = [3.68,1.63,26.17];

        const dailyLabels = ["01/01","02/01","03/01","04/01","05/01","06/01","07/01","08/01","09/01","10/01","11/01","12/01","13/01","14/01","15/01","16/01","17/01","18/01","19/01","20/01","21/01","22/01","23/01","24/01","25/01","26/01","27/01","28/01","29/01","30/01","31/01"];
        const dailyFrAvg = [0.56,0.33,0.16,0.11,0.28,0.99,0.3,0.11,0.26,0.22,0.86,0.22,33.91,0.38,0.11,0.1,0.19,1.34,0.15,1.52,0.16,0.26,0.34,0.24,0,0.23,1.6,0.19,0.1,0.36,0.45];
        const dailyResAvg = [1.04,1.86,2.24,3.89,2.72,11.51,1.8,1.35,1.78,1.89,1.4,4.72,1.78,9.35,8.06,0.37,1.57,3.24,1.44,2.59,0.43,1.44,2.62,5.54,9.28,0.99,2.14,0.98,105.91,1.65,1.57];

        // Creator Doughnut
        new Chart(document.getElementById('creatorChart'), {
            type: 'pie',
            data: {
                labels: creatorLabels,
                datasets: [{
                    data: creatorData,
                    backgroundColor: [
                        '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#22c55e', '#0ea5e9', '#64748b'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right' }
                }
            }
        });

        // Resolution Bar
        new Chart(document.getElementById('resolutionTimeChart'), {
            type: 'bar',
            data: {
                labels: typeLabels,
                datasets: [{
                    label: 'Horas',
                    data: typeData,
                    backgroundColor: 'rgba(99, 102, 241, 0.8)',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas Corridas' } }
                }
            }
        });

        // Daily First Response Chart
        new Chart(document.getElementById('dailyFrTimeChart'), {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: '1ª Resposta (Média Horas)',
                    data: dailyFrAvg,
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34, 197, 94, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas' } }
                }
            }
        });

        // Daily Resolution Chart
        new Chart(document.getElementById('dailyResTimeChart'), {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: 'Resolução (Média Horas)',
                    data: dailyResAvg,
                    borderColor: '#f97316',
                    backgroundColor: 'rgba(249, 115, 22, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas' } }
                }
            }
        });
    </script>
</body>
</html>
