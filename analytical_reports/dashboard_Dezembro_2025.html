<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analítico de Ticket Causality - Dezembro de 2025</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-8 font-sans">
    <div class="max-w-7xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-indigo-900">Métricas Analíticas Aprofundadas</h1>
            <p class="text-gray-500 mt-2">Origem, criadores e tempos de resolução detalhados em Dezembro de 2025.</p>
        </header>

        <div class="grid grid-cols-1 mb-10">
            <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                <div>
                   <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Total de Chamados Analisados</h2>
                   <p class="text-5xl font-extrabold text-indigo-600 mt-2">288</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Gráfico: Criadores (Pessoa vs Bot) -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Origem de Abertura</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="creatorChart"></canvas>
                </div>
            </div>

            <!-- Gráfico: Tempo de Resolução -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Média Horas Resolução (Por Tipo)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="resolutionTimeChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Gráfico: Evolução Diária Resposta -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Diário: Média 1ª Resposta (Horas)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="dailyFrTimeChart"></canvas>
                </div>
            </div>
            <!-- Gráfico: Evolução Diária Resolução -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <h3 class="font-bold text-lg mb-4 text-gray-700">Diário: Média Resolução (Horas)</h3>
                <div class="relative w-full h-[300px] flex-1 flex justify-center items-center">
                    <canvas id="dailyResTimeChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados Injetados Pelo Node.js
        const creatorLabels = ["Infraestrutura","NOC Grupo Cednet","Gabriel Almeida Mattos","Mayara Fernandes Figueiredo","vicente dutra de sousa","Alisson Miguel Bertocci","T.I - Grupo CEDNET","luiz henrique da silva","Gustavo Gigliotte Teixeira","Eduardo Oliveira","Chrystyan Albuquerque","marco antonio pereira rodrigues","Marcos Vinicius Cardoso","Leonardo Henrique ","Maria Eduarda","julia marcelino","claudio henrique dumas dias","Daniel","Maria Luíza Oliveira e Silva","João Gabriel Povoa de Goes","Elivelton Marques do Santos","Matheus Esposto Sagae","Vinicius de Moraes","Vinicius de Oliveira da Silva","Andrew Oliveira","Luiz Gustavo Bachiega","Alexsander de Oliveira Brazão","Julberto Capra Jr","Emanuel","Reniany","Marcio David Pereira do Carmo","Fernando Felipe Constantino Callegari","Luan Borges","Guilherme Bacchiega de Jesus"];
        const creatorData = [34,66,8,5,6,6,1,9,15,2,5,2,4,13,14,7,3,10,8,11,8,6,4,3,7,5,3,10,1,1,3,4,2,2];
        
        const typeLabels = ["Tarefa","[System] Change","[System] Incident","[System] Problem"];
        const typeData = [5.81,14.09,1.79,21.62];

        const dailyLabels = ["01/12","02/12","03/12","04/12","05/12","06/12","07/12","08/12","09/12","10/12","11/12","12/12","13/12","14/12","15/12","16/12","17/12","18/12","19/12","20/12","21/12","22/12","23/12","24/12","25/12","26/12","27/12","28/12","29/12","30/12","31/12"];
        const dailyFrAvg = [0.18,0.09,0.66,0.13,0.12,0.19,0.57,0.11,0.12,0.66,18.43,0.4,0.65,0.32,5.05,0.15,32.51,0.27,0.25,0.38,0.77,12.9,0.2,0.08,0.89,0.59,0.31,0.91,0.25,0.33,2.15];
        const dailyResAvg = [1.22,1.6,1.77,1.36,2.14,0.35,1.64,1.44,2.44,2.81,20.11,1.74,1.17,1.07,1.37,1.79,2.72,1.38,14.7,27.59,3.97,0.78,14.35,0.29,4.17,1.22,2.34,2.84,3.7,0.91,2.32];

        // Creator Doughnut
        new Chart(document.getElementById('creatorChart'), {
            type: 'pie',
            data: {
                labels: creatorLabels,
                datasets: [{
                    data: creatorData,
                    backgroundColor: [
                        '#6366f1', '#a855f7', '#ec4899', '#f43f5e', '#f97316', '#eab308', '#22c55e', '#0ea5e9', '#64748b'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'right' }
                }
            }
        });

        // Resolution Bar
        new Chart(document.getElementById('resolutionTimeChart'), {
            type: 'bar',
            data: {
                labels: typeLabels,
                datasets: [{
                    label: 'Horas',
                    data: typeData,
                    backgroundColor: 'rgba(99, 102, 241, 0.8)',
                    borderRadius: 4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas Corridas' } }
                }
            }
        });

        // Daily First Response Chart
        new Chart(document.getElementById('dailyFrTimeChart'), {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: '1ª Resposta (Média Horas)',
                    data: dailyFrAvg,
                    borderColor: '#22c55e',
                    backgroundColor: 'rgba(34, 197, 94, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas' } }
                }
            }
        });

        // Daily Resolution Chart
        new Chart(document.getElementById('dailyResTimeChart'), {
            type: 'line',
            data: {
                labels: dailyLabels,
                datasets: [{
                    label: 'Resolução (Média Horas)',
                    data: dailyResAvg,
                    borderColor: '#f97316',
                    backgroundColor: 'rgba(249, 115, 22, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, title: { display: true, text: 'Horas' } }
                }
            }
        });
    </script>
</body>
</html>
